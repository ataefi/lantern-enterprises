<!doctype html>
<html lang="en">
<head>

<title>Thank You | Lantern Enterprises</title>
<style>
:root{--gold:#D9A441;--sunset:#D96B2B;--ivory:#F8F2EA;--cream:#F0D6A2;}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:Georgia,"Times New Roman",serif;color:var(--ivory);background:radial-gradient(circle at 70% 20%,rgba(217,164,65,.22),transparent 28%),linear-gradient(135deg,#070201,#1b0703 50%,#351106);display:flex;align-items:center;justify-content:center;padding:40px;}
.card{max-width:760px;border:1px solid rgba(217,164,65,.35);background:rgba(0,0,0,.28);padding:55px;text-align:center;box-shadow:0 0 80px rgba(217,164,65,.18);}
h1{color:var(--gold);font-size:clamp(48px,7vw,82px);font-weight:400;margin:0 0 20px;}
p{color:var(--cream);font-size:20px;line-height:1.7;}
a{display:inline-block;margin-top:24px;border:1px solid var(--gold);color:var(--gold);padding:15px 30px;text-decoration:none;text-transform:uppercase;letter-spacing:2px;font-size:14px;}
.small{margin-top:30px;color:#d7b56d;font-size:16px;}
</style>
</head>

<div class="card">
<h1>Thank You</h1>
<p>Your intake has been submitted successfully. Lantern Enterprises will review your inquiry and follow up if the request appears appropriate for further discussion.</p>
<p class="small">For urgent matters, call or text (909) 451-9502.</p>

</div>
